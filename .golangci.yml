version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  # デフォルト有効 (v2): errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - misspell     # スペルミス
    - errorlint    # Go 1.13+ エラーラッピング慣習
    - copyloopvar  # ループ変数コピーの検出
    - nolintlint   # nolint ディレクティブの正当性
    - revive       # golint 後継
    - gocritic     # バグ・パフォーマンス・スタイル診断
    - godot        # コメント末尾ピリオド
    - modernize    # 新API活用提案
    - gosec        # セキュリティチェック
    - wrapcheck    # エラーラッピング
    - exhaustive   # enum switch 網羅性
    - perfsprint   # fmt.Sprintf 最適化
    - reassign     # package 変数の再代入を禁止
    - predeclared  # 組み込み識別子のシャドーを検出
    - gocheckcompilerdirectives # //go: ディレクティブの検証
    - wastedassign # 上書きされて無駄になる代入を検出
    - nilerr       # err != nil なのに nil を返すバグを検出
    - nilnesserr   # err != nil と返却値の不整合を検出
    - nilnil       # nil error と無効値の同時返却を検出
    - unconvert    # 不要な型変換を検出
    - usestdlibvars # 標準ライブラリ定数/変数の利用を促す
    - thelper      # テストヘルパーの t.Helper() を強制
    - noctx        # context なしの exec.Command などを検出
    - paralleltest # 並列実行可能なテストに t.Parallel() を要求
    # バグ防止
    - forcetypeassert # .(T) 型アサートの panic バグを検出
    - fatcontext      # ループ内 context ネストによるメモリリーク検出
    - durationcheck   # duration * duration のような計算ミスを検出
    - asasalint       # ...any に []any を渡すバグ検出
    - mirror          # bytes/strings の誤使用を検出
    - recvcheck       # レシーバ型の一貫性チェック
    - contextcheck    # 非継承 context の使用を検出
    - intrange        # for i := range n への統一
    # コード品質
    - unparam       # 未使用パラメータを検出
    - nestif        # 深すぎる if ネストを検出
    - nonamedreturns # 名前付き戻り値を禁止
    - errname       # エラー型名の命名規則
    - goconst       # 同じ文字列リテラルの繰り返しを検出
    - dupword       # コメント内の重複単語を検出
    - whitespace    # 不要な空行を検出
    - usetesting    # テストで os.Setenv → t.Setenv 等を強制
  settings:
    errcheck:
      check-blank: true  # _ = func() のエラー無視を検出
    gosec:
      excludes:
        - G204  # subprocess with variable: 常に "git" を呼ぶため誤検知
        - G304  # file inclusion via variable: CLI ツール自身が生成するパスのため誤検知
  exclusions:
    rules:
      # テストコードの wrapcheck は過剰
      - linters: [wrapcheck]
        path: "_test\\.go"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kawaken/gw

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
